version: 2

models:
  - name: dim_customer
    description: "Customer dimension (SCD Type 2 columns included)"
    columns:
      - name: customer_sk
        description: "Surrogate key - used by fact tables"
        tests:
          - unique
          - not_null
      - name: customer_id
        description: "Natural key from source system"
        tests:
          - not_null

  - name: dim_product
    description: "Product dimension (SCD Type 1)"
    columns:
      - name: product_sk
        tests:
          - unique
          - not_null
      - name: product_id
        tests:
          - unique
          - not_null

  - name: dim_date
    description: "Standard date dimension"
    columns:
      - name: date_key
        tests:
          - unique
          - not_null

  - name: fact_order_items
    description: "Fact table - grain: one row per order line item"
    columns:
      - name: customer_sk
        tests:
          - not_null
          - relationships:
              to: ref('dim_customer')
              field: customer_sk
      - name: product_sk
        tests:
          - not_null
          - relationships:
              to: ref('dim_product')
              field: product_sk
      - name: date_key
        tests:
          - not_null
          - relationships:
              to: ref('dim_date')
              field: date_key
      - name: quantity
        tests:
          - not_null
