name: ecommerce_pipeline
services:
  source_db:
    image: postgres:15
    container_name: ecommerce_source_db
    environment:
      POSTGRES_USER: source_user
      POSTGRES_PASSWORD: source_pass
      POSTGRES_DB: ecommerce_source
    ports:
      - "5433:5432"
    volumes:
      - source_db_data:/var/lib/postgresql/data
      - ../source_db:/docker-entrypoint-initdb.d

  warehouse_db:
    image: postgres:15
    container_name: ecommerce_warehouse_db
    environment:
      POSTGRES_USER: warehouse_user
      POSTGRES_PASSWORD: warehouse_pass
      POSTGRES_DB: ecommerce_warehouse
    ports:
      - "5434:5432"
    volumes:
      - warehouse_db_data:/var/lib/postgresql/data
      - ../warehouse_db:/docker-entrypoint-initdb.d

  airflow_db:
    image: postgres:15
    container_name: airflow_metadata_db
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow_db_data:/var/lib/postgresql/data

  airflow-init:
    image: apache/airflow:2.9.1
    container_name: airflow_init
    depends_on:
      - airflow_db
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow_db:5432/airflow
    volumes:
      - ../airflow/dags:/opt/airflow/dags
    entrypoint: /bin/bash
    command:
      - -c
      - "airflow db migrate && airflow users create --username admin --password admin --firstname Abdelrahman --lastname Dev --role Admin --email admin@example.com"

  airflow-webserver:
    image: apache/airflow:2.9.1
    container_name: airflow_webserver
    depends_on:
      - airflow-init
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow_db:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      SOURCE_DB_HOST: source_db
      SOURCE_DB_PORT: "5432"
      WAREHOUSE_DB_HOST: warehouse_db
      WAREHOUSE_DB_PORT: "5432"
      _PIP_ADDITIONAL_REQUIREMENTS: "pandas SQLAlchemy psycopg2-binary"
    ports:
      - "8080:8080"
    volumes:
      - ../airflow/dags:/opt/airflow/dags
      - ../etl:/opt/airflow/etl
    command: webserver

  airflow-scheduler:
    image: apache/airflow:2.9.1
    container_name: airflow_scheduler
    depends_on:
      - airflow-init
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow_db:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      SOURCE_DB_HOST: source_db
      SOURCE_DB_PORT: "5432"
      WAREHOUSE_DB_HOST: warehouse_db
      WAREHOUSE_DB_PORT: "5432"
      _PIP_ADDITIONAL_REQUIREMENTS: "pandas SQLAlchemy psycopg2-binary"
    volumes:
      - ../airflow/dags:/opt/airflow/dags
      - ../etl:/opt/airflow/etl
    command: scheduler

volumes:
  source_db_data:
  warehouse_db_data:
  airflow_db_data: